name: Build Desktop Installers

# Produces the Windows installer (.msi) and macOS DMG from CI, since Tauri
# cannot cross-compile Windows binaries from macOS.
#
# Triggers:
#   - push to default branch / PR to default branch -> build only (artifacts downloadable)
#   - published GitHub Release   -> build + attach installers to the release
#   - manual dispatch            -> build only

on:
  push:
    branches: [001-build-an-application]
  pull_request:
    branches: [001-build-an-application]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bootstrap admin baked into the bundle (PBKDF2-hashed at first run).
          NEXT_PUBLIC_CAMOG_BOOTSTRAP_ADMIN_USERNAME: admin
          NEXT_PUBLIC_CAMOG_BOOTSTRAP_ADMIN_PASSCODE: Clinic2026!
          NEXT_PUBLIC_CAMOG_BOOTSTRAP_ADMIN_DISPLAY_NAME: Administrator
          NEXT_PUBLIC_CAMOG_BOOTSTRAP_ADMIN_MUST_CHANGE: "false"
        with:
          args: ${{ matrix.args }}

      - name: Upload installers (build artifact)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: camog-${{ matrix.platform }}-${{ matrix.args || 'default' }}
          path: |
            src-tauri/target/*/release/bundle/**/*.dmg
            src-tauri/target/*/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error
